services:
  - type: web
    name: nearme-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free

    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: UPLOAD_DIR
        value: /tmp/uploads

  - type: static
    name: nearme-frontend
    rootDir: frontend
    staticPublishPath: .

    headers:
      - path: /*
        name: Cache-Control
        value: no-cache